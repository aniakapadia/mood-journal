<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mood Journal — Coastal Watercolor</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Quicksand', sans-serif;
    background: #FAF3E7;
    color: #2C4A63;
    min-height: 100vh;
    padding: 28px 22px 50px;
    position: relative;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 0% 0%, rgba(127, 178, 212, 0.35) 0%, transparent 40%),
      radial-gradient(ellipse at 100% 30%, rgba(197, 220, 232, 0.5) 0%, transparent 35%),
      radial-gradient(ellipse at 20% 100%, rgba(127, 178, 212, 0.25) 0%, transparent 40%);
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><filter id='n'><feTurbulence baseFrequency='0.9' /><feColorMatrix values='0 0 0 0 0.9  0 0 0 0 0.85  0 0 0 0 0.75  0 0 0 0.06 0'/></filter><rect width='100' height='100' filter='url(%23n)'/></svg>");
    pointer-events: none;
    opacity: 0.6;
    z-index: 0;
  }
  .content { position: relative; z-index: 1; }

  .header { text-align: center; margin-bottom: 24px; }
  .date {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: #7FB2D4;
    margin-bottom: 4px;
  }
  h1 {
    font-family: 'Caveat', cursive;
    font-weight: 700;
    font-size: 36px;
    line-height: 1.1;
    color: #2C4A63;
  }
  h1 .swirl { color: #7FB2D4; font-style: italic; }

  .doodle-wave {
    display: block;
    margin: 8px auto 18px;
    opacity: 0.7;
  }

  .moods {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 30px;
  }
  .mood {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    cursor: pointer;
    border: none;
    background: transparent;
    position: relative;
    transition: transform 0.15s ease;
  }
  .mood::before {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(197, 220, 232, 0.9), rgba(127, 178, 212, 0.55) 70%, rgba(127, 178, 212, 0.2));
    box-shadow: inset 0 -4px 8px rgba(44, 74, 99, 0.08);
    z-index: -1;
  }
  .mood:active { transform: scale(0.92); }
  .mood.selected::before {
    background: radial-gradient(circle at 35% 30%, rgba(127, 178, 212, 0.95), rgba(91, 143, 176, 0.8) 70%, rgba(91, 143, 176, 0.5));
    inset: 2px;
  }

  .calendar-card {
    background: rgba(255, 253, 247, 0.7);
    border-radius: 20px;
    padding: 22px 18px;
    backdrop-filter: blur(2px);
    border: 1px solid rgba(127, 178, 212, 0.2);
  }
  .cal-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }
  .cal-title {
    font-family: 'Caveat', cursive;
    font-size: 28px;
    font-weight: 600;
    color: #2C4A63;
  }
  .cal-arrows { display: flex; gap: 14px; color: #7FB2D4; font-size: 22px; font-family: 'Caveat', cursive; }
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 10px;
  }
  .weekday {
    text-align: center;
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: #7FB2D4;
  }
  .days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #B5C7D4;
    font-family: 'Caveat', cursive;
    font-weight: 600;
    position: relative;
  }
  .day.empty { color: transparent; }
  .day .bloom {
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    z-index: -1;
    filter: blur(0.5px);
  }
  .day.has-mood { color: #2C4A63; font-size: 14px; }
  .bloom.happy { background: radial-gradient(circle at 40% 35%, #F8D78A, #F4C95D 60%, transparent 80%); }
  .bloom.love  { background: radial-gradient(circle at 40% 35%, #F2B5C6, #E8869B 60%, transparent 80%); }
  .bloom.calm  { background: radial-gradient(circle at 40% 35%, #C5DCE8, #7FB2D4 60%, transparent 80%); }
  .bloom.meh   { background: radial-gradient(circle at 40% 35%, #E0D4BF, #C8B89E 60%, transparent 80%); }
  .bloom.sad   { background: radial-gradient(circle at 40% 35%, #8FA8C2, #5B7F9E 60%, transparent 80%); }
  .bloom.angry { background: radial-gradient(circle at 40% 35%, #E5A088, #C97B63 60%, transparent 80%); }
  .day.today { color: #2C4A63; }
  .day.today::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    background: #2C4A63;
    border-radius: 50%;
  }

  .footer-tip {
    text-align: center;
    margin-top: 20px;
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: #7FB2D4;
  }
</style>
</head>
<body>
<div class="content">

  <div class="header">
    <div class="date">saturday, may 9</div>
    <h1>how's your <span class="swirl">heart</span> today, ania?</h1>
  </div>

  <svg class="doodle-wave" width="180" height="14" viewBox="0 0 180 14">
    <path d="M2,7 Q15,1 30,7 T60,7 T90,7 T120,7 T150,7 T178,7"
      stroke="#7FB2D4" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  </svg>

  <div class="moods">
    <button class="mood">😊</button>
    <button class="mood selected">😍</button>
    <button class="mood">😌</button>
    <button class="mood">😐</button>
    <button class="mood">😢</button>
    <button class="mood">😡</button>
  </div>

  <div class="calendar-card">
    <div class="cal-header">
      <div class="cal-title">May 2026</div>
      <div class="cal-arrows"><span>‹</span><span>›</span></div>
    </div>
    <div class="weekdays">
      <div class="weekday">S</div><div class="weekday">M</div><div class="weekday">T</div>
      <div class="weekday">W</div><div class="weekday">T</div><div class="weekday">F</div><div class="weekday">S</div>
    </div>
    <div class="days">
      <div class="day empty">·</div><div class="day empty">·</div><div class="day empty">·</div><div class="day empty">·</div><div class="day empty">·</div>
      <div class="day has-mood"><div class="bloom happy"></div>1</div>
      <div class="day has-mood"><div class="bloom calm"></div>2</div>
      <div class="day has-mood"><div class="bloom love"></div>3</div>
      <div class="day has-mood"><div class="bloom happy"></div>4</div>
      <div class="day has-mood"><div class="bloom meh"></div>5</div>
      <div class="day has-mood"><div class="bloom calm"></div>6</div>
      <div class="day has-mood"><div class="bloom sad"></div>7</div>
      <div class="day has-mood"><div class="bloom happy"></div>8</div>
      <div class="day has-mood today"><div class="bloom love"></div>9</div>
      <div class="day">10</div><div class="day">11</div><div class="day">12</div><div class="day">13</div>
      <div class="day">14</div><div class="day">15</div><div class="day">16</div><div class="day">17</div>
      <div class="day">18</div><div class="day">19</div><div class="day">20</div><div class="day">21</div>
      <div class="day">22</div><div class="day">23</div><div class="day">24</div><div class="day">25</div>
      <div class="day">26</div><div class="day">27</div><div class="day">28</div><div class="day">29</div>
      <div class="day">30</div><div class="day">31</div>
    </div>
  </div>

  <div class="footer-tip">~ paint your day ~</div>
</div>

<script>
  document.querySelectorAll('.mood').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.mood').forEach(x => x.classList.remove('selected'));
      b.classList.add('selected');
    });
  });
</script>
</body>
</html>
